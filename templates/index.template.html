    <!-- Theme pre-paint: set data-theme before any CSS loads so there is no
         flash of the wrong theme. ThemeController keeps it in sync afterwards. -->
    <script>
        (function () {
            var theme = 'dark';
            var lastTab = 'practice';
            try {
                theme = localStorage.getItem('hsk-theme') || 'dark';
                lastTab = localStorage.getItem('hsk-last-tab') || 'practice';
            } catch (e) { /* storage blocked */ }
            var root = document.documentElement;
            root.setAttribute('data-theme', theme);
            root.setAttribute('data-active-tab', lastTab);
            root.classList.add(theme === 'dark' ? 'dark-theme' : 'light-theme');
        })();
    </script>
